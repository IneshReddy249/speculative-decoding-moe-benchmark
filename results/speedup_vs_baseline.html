<div style="padding: 1rem 0;">
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #3266ad;"></span>MTP + SpecV2</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #c0392b;"></span>EAGLE3 + SpecV2</span>
</div>
<div style="position: relative; width: 100%; height: 320px;">
  <canvas id="speedupChart" role="img" aria-label="Bar chart showing speedup over baseline for MTP and EAGLE3 at each concurrency level">Speedup comparison.</canvas>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('speedupChart'), {
  type: 'bar',
  data: {
    labels: ['c=1', 'c=4', 'c=8', 'c=16', 'c=32'],
    datasets: [
      { label: 'MTP + SpecV2', data: [1.30, 1.16, 1.16, 1.15, 1.28], backgroundColor: '#3266ad', borderRadius: 3, barPercentage: 0.7 },
      { label: 'EAGLE3 + SpecV2', data: [1.34, 1.14, 1.18, 1.18, 1.11], backgroundColor: '#c0392b', borderRadius: 3, barPercentage: 0.7 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: function(c) { return c.dataset.label + ': ' + c.parsed.y.toFixed(2) + 'x'; } } },
      annotation: undefined
    },
    scales: {
      x: { grid: { display: false } },
      y: { title: { display: true, text: 'Speedup vs baseline', font: { size: 13 } }, grid: { color: 'rgba(128,128,128,0.1)' }, min: 1.0, max: 1.45, ticks: { callback: function(v) { return v.toFixed(2) + 'x'; } } }
    }
  },
  plugins: [{
    afterDraw: function(chart) {
      const ctx2 = chart.ctx;
      chart.data.datasets.forEach(function(ds, i) {
        const meta = chart.getDatasetMeta(i);
        meta.data.forEach(function(bar, idx) {
          ctx2.save();
          ctx2.fillStyle = 'var(--color-text-secondary, #888)';
          ctx2.font = '11px sans-serif';
          ctx2.textAlign = 'center';
          ctx2.fillText(ds.data[idx].toFixed(2) + 'x', bar.x, bar.y - 6);
          ctx2.restore();
        });
      });
    }
  }]
});
</script>
