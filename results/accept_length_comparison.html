<div style="padding: 1rem 0;">
<div style="position: relative; width: 100%; height: 200px;">
  <canvas id="acceptChart" role="img" aria-label="Horizontal bar chart comparing accept length between MTP and EAGLE3 configurations">Accept length by config.</canvas>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('acceptChart'), {
  type: 'bar',
  data: {
    labels: ['EAGLE3 (topk=4)', 'EAGLE3 + SpecV2', 'MTP (steps=3)', 'MTP + SpecV2'],
    datasets: [{
      data: [2.28, 2.02, 1.86, 1.65],
      backgroundColor: ['#c0392b', '#e74c3c', '#2c5f8a', '#3266ad'],
      borderRadius: 3,
      barPercentage: 0.6
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: function(c) { return c.parsed.x.toFixed(2) + ' tokens/step'; } } }
    },
    scales: {
      x: { title: { display: true, text: 'Accept length (tokens per verification step)', font: { size: 12 } }, grid: { color: 'rgba(128,128,128,0.1)' }, min: 0, max: 3.0 },
      y: { grid: { display: false } }
    }
  },
  plugins: [{
    afterDraw: function(chart) {
      const ctx2 = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      meta.data.forEach(function(bar, idx) {
        ctx2.save();
        ctx2.fillStyle = 'var(--color-text-secondary, #888)';
        ctx2.font = '12px sans-serif';
        ctx2.textBaseline = 'middle';
        ctx2.fillText(chart.data.datasets[0].data[idx].toFixed(2), bar.x + 8, bar.y);
        ctx2.restore();
      });
    }
  }]
});
</script>
